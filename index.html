<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor Igor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e5e5e0;padding:14px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:16px;font-weight:600;color:#1a1a18}
header span{font-size:12px;color:#888;background:#f0f0ea;padding:2px 8px;border-radius:20px}
.container{max-width:960px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#fff;padding:6px;border-radius:10px;border:1px solid #e5e5e0}
.tab{flex:1;padding:8px;border-radius:7px;border:none;font-size:13px;cursor:pointer;background:transparent;color:#666;font-family:inherit;transition:all .15s;text-align:center}
.tab.active{background:#1a1a18;color:#fff;font-weight:500}
.panel{display:none}.panel.active{display:block}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric{background:#f5f5f0;border-radius:8px;padding:12px 14px}
.metric-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600}
.green{color:#0f6e56}.red{color:#993c1d}.amber{color:#854f0b}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:500;color:#888;font-size:11px;padding:6px 8px;border-bottom:1px solid #f0f0ea}
td{padding:8px 8px;border-bottom:1px solid #f5f5f0;vertical-align:top}
tr:last-child td{border-bottom:none}
input,select,textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid #e5e5e0;border-radius:8px;background:#fff;color:#1a1a18;font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:#888}
textarea{resize:vertical;min-height:60px}
.row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-end}
.col{flex:1}
.col label{font-size:11px;color:#888;margin-bottom:4px;display:block;font-weight:500}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #e5e5e0;font-size:13px;cursor:pointer;background:#fff;color:#1a1a18;font-family:inherit;transition:all .15s}
.btn:hover{background:#f5f5f0}
.btn.primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn.primary:hover{opacity:.85}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge.receita{background:#e1f5ee;color:#085041}
.badge.despesa{background:#faece7;color:#4a1b0c}
.badge.alta{background:#fcebeb;color:#501313}
.badge.media{background:#faeeda;color:#412402}
.badge.baixa{background:#eaf3de;color:#173404}
.badge.feito{background:#e1f5ee;color:#085041}
.badge.fazendo{background:#e6f1fb;color:#042c53}
.badge.aberto{background:#f5f5f0;color:#444}
.progress-bar{height:6px;background:#f0f0ea;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.empresa-tag{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-block}
.tag-mood{background:#eeedfe;color:#3c3489}
.tag-conecta{background:#e1f5ee;color:#085041}
.tag-pessoal{background:#faeeda;color:#633806}
.empty{text-align:center;color:#aaa;font-size:13px;padding:24px 0}
.icon-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:13px;padding:2px 6px;border-radius:4px}
.icon-btn:hover{background:#fef0f0;color:#c04828}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #f5f5f0}
.summary-row:last-child{border-bottom:none;font-weight:600;padding-top:10px}
.loading{text-align:center;padding:40px;color:#aaa;font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a18;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:600px){.row{flex-direction:column}.metric-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header>
  <h1>⚡ Gestor Igor</h1>
  <span id="sync-status">conectando...</span>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('financeiro')">💰 Financeiro</button>
    <button class="tab" onclick="showTab('tarefas')">✅ Tarefas</button>
    <button class="tab" onclick="showTab('metas')">🎯 Metas</button>
    <button class="tab" onclick="showTab('agenda')">📅 Agenda</button>
  </div>

  <!-- FINANCEIRO -->
  <div id="tab-financeiro" class="panel active">
    <div id="fin-metrics" class="metric-grid"></div>
    <div class="card">
      <div class="card-title">Nova transação</div>
      <div class="row">
        <div class="col"><label>Empresa</label>
          <select id="fin-empresa"><option>Mood Mentoria</option><option>Conecta</option><option>Pessoal</option></select>
        </div>
        <div class="col"><label>Tipo</label>
          <select id="fin-tipo"><option value="receita">Receita</option><option value="despesa">Despesa</option></select>
        </div>
      </div>
      <div class="row">
        <div class="col"><label>Descrição</label><input type="text" id="fin-desc" placeholder="Ex: Consultoria Vale do Rio Doce"></div>
        <div class="col" style="max-width:140px"><label>Valor (R$)</label><input type="number" id="fin-valor" placeholder="0,00" step="0.01"></div>
      </div>
      <div class="row">
        <div class="col"><label>Categoria</label><input type="text" id="fin-cat" placeholder="Ex: Receita de mentoria"></div>
        <div class="col" style="max-width:140px"><label>Data</label><input type="date" id="fin-data"></div>
      </div>
      <button class="btn primary" onclick="addTransacao()">+ Adicionar</button>
    </div>
    <div class="card">
      <div class="card-title">Extrato</div>
      <div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap">
        <select id="fin-filtro-empresa" onchange="renderExtrato()" style="width:auto;font-size:12px;padding:5px 8px">
          <option value="">Todas as empresas</option>
          <option>Mood Mentoria</option><option>Conecta</option><option>Pessoal</option>
        </select>
        <select id="fin-filtro-tipo" onchange="renderExtrato()" style="width:auto;font-size:12px;padding:5px 8px">
          <option value="">Receitas e despesas</option>
          <option value="receita">Só receitas</option><option value="despesa">Só despesas</option>
        </select>
      </div>
      <div id="extrato-body"></div>
    </div>
    <div class="card">
      <div class="card-title">Resumo por empresa</div>
      <div id="resumo-empresas"></div>
    </div>
  </div>

  <!-- TAREFAS -->
  <div id="tab-tarefas" class="panel">
    <div class="card">
      <div class="card-title">Nova tarefa</div>
      <div class="row">
        <div class="col"><label>Tarefa</label><input type="text" id="task-nome" placeholder="Ex: Enviar proposta para Vale"></div>
        <div class="col" style="max-width:160px"><label>Empresa</label>
          <select id="task-empresa"><option>Mood Mentoria</option><option>Conecta</option><option>Pessoal</option></select>
        </div>
      </div>
      <div class="row">
        <div class="col"><label>Prioridade</label>
          <select id="task-prio"><option value="alta">Alta</option><option value="media">Média</option><option value="baixa">Baixa</option></select>
        </div>
        <div class="col"><label>Prazo</label><input type="date" id="task-prazo"></div>
        <div class="col"><label>Status</label>
          <select id="task-status"><option value="aberto">Aberto</option><option value="fazendo">Fazendo</option><option value="feito">Feito</option></select>
        </div>
      </div>
      <div class="row"><div class="col"><label>Notas</label><textarea id="task-nota" placeholder="Observações..."></textarea></div></div>
      <button class="btn primary" onclick="addTask()">+ Adicionar</button>
    </div>
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <select id="task-filtro-empresa" onchange="renderTasks()" style="width:auto;font-size:12px;padding:5px 8px">
          <option value="">Todas</option><option>Mood Mentoria</option><option>Conecta</option><option>Pessoal</option>
        </select>
        <select id="task-filtro-status" onchange="renderTasks()" style="width:auto;font-size:12px;padding:5px 8px">
          <option value="">Todos os status</option>
          <option value="aberto">Aberto</option><option value="fazendo">Fazendo</option><option value="feito">Feito</option>
        </select>
      </div>
      <div id="tasks-body"></div>
    </div>
  </div>

  <!-- METAS -->
  <div id="tab-metas" class="panel">
    <div class="card">
      <div class="card-title">Nova meta</div>
      <div class="row">
        <div class="col"><label>Meta</label><input type="text" id="meta-nome" placeholder="Ex: Fechar contrato com Vale"></div>
        <div class="col" style="max-width:160px"><label>Empresa</label>
          <select id="meta-empresa"><option>Mood Mentoria</option><option>Conecta</option><option>Pessoal</option></select>
        </div>
      </div>
      <div class="row">
        <div class="col"><label>Valor alvo</label><input type="number" id="meta-alvo" placeholder="Ex: 50000"></div>
        <div class="col"><label>Progresso atual</label><input type="number" id="meta-prog" placeholder="Ex: 12000"></div>
        <div class="col"><label>Prazo</label><input type="date" id="meta-prazo"></div>
      </div>
      <div class="row"><div class="col"><label>Unidade (R$, clientes, horas...)</label><input type="text" id="meta-unidade" placeholder="R$"></div></div>
      <button class="btn primary" onclick="addMeta()">+ Adicionar</button>
    </div>
    <div id="metas-body"></div>
  </div>

  <!-- AGENDA -->
  <div id="tab-agenda" class="panel">
    <div class="card">
      <div class="card-title">Novo evento</div>
      <div class="row">
        <div class="col"><label>Evento</label><input type="text" id="ev-nome" placeholder="Ex: Reunião com Guilherme Gatti"></div>
        <div class="col" style="max-width:160px"><label>Empresa</label>
          <select id="ev-empresa"><option>Mood Mentoria</option><option>Conecta</option><option>Pessoal</option></select>
        </div>
      </div>
      <div class="row">
        <div class="col"><label>Data e hora</label><input type="datetime-local" id="ev-data"></div>
        <div class="col"><label>Local / Link</label><input type="text" id="ev-local" placeholder="Google Meet, endereço..."></div>
      </div>
      <div class="row"><div class="col"><label>Notas</label><textarea id="ev-nota" placeholder="Pauta, lembrete..."></textarea></div></div>
      <button class="btn primary" onclick="addEvento()">+ Adicionar</button>
    </div>
    <div class="card">
      <div class="card-title">Próximos eventos</div>
      <div id="eventos-body"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzFrI9-1nFFzk1JVztoe8mdjfiFuK4QI0",
  authDomain: "gestor-igor.firebaseapp.com",
  projectId: "gestor-igor",
  storageBucket: "gestor-igor.firebasestorage.app",
  messagingSenderId: "152088160247",
  appId: "1:152088160247:web:ada798c0b53c4f69d0b0f2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Estado local
let state = { transacoes:[], tasks:[], metas:[], eventos:[] };

// Toast
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// Status
function setSyncStatus(msg, color='#888') {
  const el = document.getElementById('sync-status');
  el.textContent = msg; el.style.color = color;
}

// Utils
function fmt(v){ return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return '-'; try{ return new Date(d+'T12:00').toLocaleDateString('pt-BR'); }catch(e){return d;} }
function empresaTag(e){
  const cls = e==='Mood Mentoria'?'tag-mood':e==='Conecta'?'tag-conecta':'tag-pessoal';
  return `<span class="empresa-tag ${cls}">${e}</span>`;
}

// ---- TABS ----
window.showTab = function(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  const map={financeiro:0,tarefas:1,metas:2,agenda:3};
  document.querySelectorAll('.tab')[map[id]].classList.add('active');
};

// ---- LOAD ALL ----
async function loadAll() {
  setSyncStatus('sincronizando...');
  try {
    const cols = ['transacoes','tasks','metas','eventos'];
    for(const col of cols) {
      const snap = await getDocs(collection(db, col));
      state[col] = snap.docs.map(d=>({id:d.id,...d.data()}));
    }
    setSyncStatus('● online', '#0f6e56');
    render();
  } catch(e) {
    setSyncStatus('● offline', '#993c1d');
    console.error(e);
  }
}

// ---- FINANCEIRO ----
window.addTransacao = async function() {
  const desc = document.getElementById('fin-desc').value.trim();
  const valor = parseFloat(document.getElementById('fin-valor').value);
  if(!desc||isNaN(valor)||valor<=0){ alert('Preencha descrição e valor.'); return; }
  const obj = {
    empresa: document.getElementById('fin-empresa').value,
    tipo: document.getElementById('fin-tipo').value,
    desc, valor,
    categoria: document.getElementById('fin-cat').value.trim(),
    data: document.getElementById('fin-data').value || new Date().toISOString().split('T')[0],
    criadoEm: Date.now()
  };
  setSyncStatus('salvando...');
  const ref = await addDoc(collection(db,'transacoes'), obj);
  state.transacoes.unshift({id:ref.id,...obj});
  ['fin-desc','fin-valor','fin-cat','fin-data'].forEach(id=>document.getElementById(id).value='');
  setSyncStatus('● online','#0f6e56');
  toast('Transação salva ✓');
  renderFinanceiro();
};

window.delTransacao = async function(id) {
  await deleteDoc(doc(db,'transacoes',id));
  state.transacoes = state.transacoes.filter(t=>t.id!==id);
  toast('Removido');
  renderFinanceiro();
};

function renderFinanceiro(){ renderMetrics(); renderExtrato(); renderResumo(); }

function renderMetrics(){
  const rec = state.transacoes.filter(t=>t.tipo==='receita').reduce((a,t)=>a+t.valor,0);
  const desp = state.transacoes.filter(t=>t.tipo==='despesa').reduce((a,t)=>a+t.valor,0);
  const saldo = rec-desp;
  const mood = state.transacoes.filter(t=>t.empresa==='Mood Mentoria'&&t.tipo==='receita').reduce((a,t)=>a+t.valor,0);
  const con = state.transacoes.filter(t=>t.empresa==='Conecta'&&t.tipo==='receita').reduce((a,t)=>a+t.valor,0);
  document.getElementById('fin-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Receitas</div><div class="metric-value green">${fmt(rec)}</div></div>
    <div class="metric"><div class="metric-label">Despesas</div><div class="metric-value red">${fmt(desp)}</div></div>
    <div class="metric"><div class="metric-label">Saldo</div><div class="metric-value ${saldo>=0?'green':'red'}">${fmt(saldo)}</div></div>
    <div class="metric"><div class="metric-label">Mood Mentoria</div><div class="metric-value amber">${fmt(mood)}</div></div>
    <div class="metric"><div class="metric-label">Conecta</div><div class="metric-value">${fmt(con)}</div></div>`;
}

function renderExtrato(){
  const fe=document.getElementById('fin-filtro-empresa').value;
  const ft=document.getElementById('fin-filtro-tipo').value;
  let list=state.transacoes.filter(t=>(!fe||t.empresa===fe)&&(!ft||t.tipo===ft));
  if(!list.length){document.getElementById('extrato-body').innerHTML='<div class="empty">Nenhuma transação ainda.</div>';return;}
  document.getElementById('extrato-body').innerHTML=`<table>
    <tr><th>Data</th><th>Empresa</th><th>Descrição</th><th>Tipo</th><th style="text-align:right">Valor</th><th></th></tr>
    ${list.map(t=>`<tr>
      <td>${fmtDate(t.data)}</td><td>${empresaTag(t.empresa)}</td><td>${t.desc}${t.categoria?`<br><span style="font-size:11px;color:#aaa">${t.categoria}</span>`:''}</td>
      <td><span class="badge ${t.tipo}">${t.tipo}</span></td>
      <td style="text-align:right;font-weight:600;color:${t.tipo==='receita'?'#0f6e56':'#993c1d'}">${fmt(t.valor)}</td>
      <td><button class="icon-btn" onclick="delTransacao('${t.id}')">✕</button></td>
    </tr>`).join('')}</table>`;
}

function renderResumo(){
  const empresas=['Mood Mentoria','Conecta','Pessoal'];
  let html='';
  empresas.forEach(e=>{
    const rec=state.transacoes.filter(t=>t.empresa===e&&t.tipo==='receita').reduce((a,t)=>a+t.valor,0);
    const desp=state.transacoes.filter(t=>t.empresa===e&&t.tipo==='despesa').reduce((a,t)=>a+t.valor,0);
    if(rec===0&&desp===0) return;
    html+=`<div style="margin-bottom:14px">${empresaTag(e)}
      <div class="summary-row"><span>Receitas</span><span style="color:#0f6e56">${fmt(rec)}</span></div>
      <div class="summary-row"><span>Despesas</span><span style="color:#993c1d">${fmt(desp)}</span></div>
      <div class="summary-row"><span>Saldo</span><span style="color:${rec-desp>=0?'#0f6e56':'#993c1d'}">${fmt(rec-desp)}</span></div>
    </div>`;
  });
  document.getElementById('resumo-empresas').innerHTML=html||'<div class="empty">Nenhum dado.</div>';
}

// ---- TAREFAS ----
window.addTask = async function(){
  const nome=document.getElementById('task-nome').value.trim();
  if(!nome){alert('Informe a tarefa.');return;}
  const obj={
    nome, empresa:document.getElementById('task-empresa').value,
    prioridade:document.getElementById('task-prio').value,
    prazo:document.getElementById('task-prazo').value,
    status:document.getElementById('task-status').value,
    nota:document.getElementById('task-nota').value.trim(),
    criadoEm:Date.now()
  };
  const ref=await addDoc(collection(db,'tasks'),obj);
  state.tasks.unshift({id:ref.id,...obj});
  ['task-nome','task-prazo','task-nota'].forEach(id=>document.getElementById(id).value='');
  toast('Tarefa salva ✓');
  renderTasks();
};

window.delTask = async function(id){
  await deleteDoc(doc(db,'tasks',id));
  state.tasks=state.tasks.filter(t=>t.id!==id);
  toast('Removido'); renderTasks();
};

window.updateTaskStatus = async function(id,val){
  await updateDoc(doc(db,'tasks',id),{status:val});
  const t=state.tasks.find(t=>t.id===id); if(t) t.status=val;
  renderTasks();
};

function renderTasks(){
  const fe=document.getElementById('task-filtro-empresa').value;
  const fs=document.getElementById('task-filtro-status').value;
  let list=state.tasks.filter(t=>(!fe||t.empresa===fe)&&(!fs||t.status===fs));
  if(!list.length){document.getElementById('tasks-body').innerHTML='<div class="empty">Nenhuma tarefa.</div>';return;}
  const pmap={alta:0,media:1,baixa:2},smap={aberto:0,fazendo:1,feito:2};
  list.sort((a,b)=>smap[a.status]-smap[b.status]||pmap[a.prioridade]-pmap[b.prioridade]);
  document.getElementById('tasks-body').innerHTML=`<table>
    <tr><th>Tarefa</th><th>Empresa</th><th>Prioridade</th><th>Prazo</th><th>Status</th><th></th></tr>
    ${list.map(t=>`<tr>
      <td><div style="font-weight:500">${t.nome}</div>${t.nota?`<div style="font-size:11px;color:#aaa;margin-top:2px">${t.nota}</div>`:''}</td>
      <td>${empresaTag(t.empresa)}</td>
      <td><span class="badge ${t.prioridade}">${t.prioridade}</span></td>
      <td style="font-size:12px;color:#888">${fmtDate(t.prazo)}</td>
      <td><select onchange="updateTaskStatus('${t.id}',this.value)" style="font-size:12px;padding:4px 6px;width:auto">
        <option value="aberto" ${t.status==='aberto'?'selected':''}>Aberto</option>
        <option value="fazendo" ${t.status==='fazendo'?'selected':''}>Fazendo</option>
        <option value="feito" ${t.status==='feito'?'selected':''}>Feito</option>
      </select></td>
      <td><button class="icon-btn" onclick="delTask('${t.id}')">✕</button></td>
    </tr>`).join('')}</table>`;
}

// ---- METAS ----
window.addMeta = async function(){
  const nome=document.getElementById('meta-nome').value.trim();
  const alvo=parseFloat(document.getElementById('meta-alvo').value);
  if(!nome||isNaN(alvo)){alert('Informe nome e valor alvo.');return;}
  const obj={
    nome, empresa:document.getElementById('meta-empresa').value,
    alvo, prog:parseFloat(document.getElementById('meta-prog').value)||0,
    prazo:document.getElementById('meta-prazo').value,
    unidade:document.getElementById('meta-unidade').value.trim()||'R$',
    criadoEm:Date.now()
  };
  const ref=await addDoc(collection(db,'metas'),obj);
  state.metas.push({id:ref.id,...obj});
  ['meta-nome','meta-alvo','meta-prog','meta-prazo','meta-unidade'].forEach(id=>document.getElementById(id).value='');
  toast('Meta salva ✓'); renderMetas();
};

window.delMeta = async function(id){
  await deleteDoc(doc(db,'metas',id));
  state.metas=state.metas.filter(m=>m.id!==id);
  toast('Removido'); renderMetas();
};

window.updateMetaProg = async function(id){
  const val=parseFloat(document.getElementById('prog-input-'+id).value);
  if(isNaN(val)){alert('Informe um número.');return;}
  await updateDoc(doc(db,'metas',id),{prog:val});
  const m=state.metas.find(m=>m.id===id); if(m) m.prog=val;
  toast('Progresso atualizado ✓'); renderMetas();
};

function renderMetas(){
  if(!state.metas.length){document.getElementById('metas-body').innerHTML='<div class="card"><div class="empty">Nenhuma meta.</div></div>';return;}
  document.getElementById('metas-body').innerHTML=state.metas.map(m=>{
    const pct=Math.min(100,Math.round((m.prog/m.alvo)*100));
    const fv=v=>m.unidade==='R$'?fmt(v):`${Number(v).toLocaleString('pt-BR')} ${m.unidade}`;
    const cor=pct>=100?'#1d9e75':pct>=60?'#ef9f27':'#378add';
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><div style="font-weight:600;font-size:14px;margin-bottom:4px">${m.nome}</div>
        <div style="display:flex;gap:6px;align-items:center">${empresaTag(m.empresa)} ${m.prazo?`<span style="font-size:11px;color:#aaa">até ${fmtDate(m.prazo)}</span>`:''}</div></div>
        <button class="icon-btn" onclick="delMeta('${m.id}')">✕</button>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px">
        <span>Progresso: <strong style="color:#1a1a18">${fv(m.prog)}</strong></span>
        <span>Alvo: <strong style="color:#1a1a18">${fv(m.alvo)}</strong></span>
        <span style="font-weight:600;color:${cor}">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${cor}"></div></div>
      <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
        <input type="number" placeholder="Atualizar progresso" style="flex:1;font-size:12px;padding:6px 8px" id="prog-input-${m.id}">
        <button class="btn" style="font-size:12px;padding:6px 12px;white-space:nowrap" onclick="updateMetaProg('${m.id}')">Salvar</button>
      </div>
    </div>`;
  }).join('');
}

// ---- AGENDA ----
window.addEvento = async function(){
  const nome=document.getElementById('ev-nome').value.trim();
  const data=document.getElementById('ev-data').value;
  if(!nome||!data){alert('Informe evento e data.');return;}
  const obj={
    nome, empresa:document.getElementById('ev-empresa').value,
    data, local:document.getElementById('ev-local').value.trim(),
    nota:document.getElementById('ev-nota').value.trim(),
    criadoEm:Date.now()
  };
  const ref=await addDoc(collection(db,'eventos'),obj);
  state.eventos.push({id:ref.id,...obj});
  state.eventos.sort((a,b)=>a.data.localeCompare(b.data));
  ['ev-nome','ev-data','ev-local','ev-nota'].forEach(id=>document.getElementById(id).value='');
  toast('Evento salvo ✓'); renderEventos();
};

window.delEvento = async function(id){
  await deleteDoc(doc(db,'eventos',id));
  state.eventos=state.eventos.filter(e=>e.id!==id);
  toast('Removido'); renderEventos();
};

function renderEventos(){
  const now=new Date().toISOString().slice(0,16);
  const fut=state.eventos.filter(e=>e.data>=now);
  const past=state.eventos.filter(e=>e.data<now);
  if(!state.eventos.length){document.getElementById('eventos-body').innerHTML='<div class="empty">Nenhum evento.</div>';return;}
  const rl=(list,titulo)=>{
    if(!list.length) return '';
    return `${titulo?`<div style="font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 6px">${titulo}</div>`:''}
    ${list.map(e=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f0">
      <div><div style="font-weight:500;font-size:13px;margin-bottom:3px">${e.nome}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${empresaTag(e.empresa)}
        <span style="font-size:11px;color:#aaa">📅 ${fmtDate(e.data.split('T')[0])} ${e.data.includes('T')?'⏰ '+e.data.split('T')[1].substring(0,5):''}</span>
        ${e.local?`<span style="font-size:11px;color:#aaa">📍 ${e.local}</span>`:''}
      </div>
      ${e.nota?`<div style="font-size:11px;color:#aaa;margin-top:3px">${e.nota}</div>`:''}</div>
      <button class="icon-btn" onclick="delEvento('${e.id}')">✕</button>
    </div>`).join('')}`;
  };
  document.getElementById('eventos-body').innerHTML=rl(fut,'Próximos')+rl(past,'Passados');
}

function render(){ renderFinanceiro(); renderTasks(); renderMetas(); renderEventos(); }

// init
document.getElementById('fin-data').value = new Date().toISOString().split('T')[0];
document.getElementById('task-prazo').value = new Date().toISOString().split('T')[0];
loadAll();
</script>
